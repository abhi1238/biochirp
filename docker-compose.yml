x-defaults: &defaults
  build:
    dockerfile: Dockerfile
  environment:
    - PYTHONUNBUFFERED=1
    - TZ=Asia/Kolkata
  logging:
    driver: "json-file"
    options:
      max-size: "500m"
      max-file: "5"
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  networks:
    - semantic_net
  restart: unless-stopped
  env_file:
    - .env
  healthcheck:
    interval: 15s
    timeout: 5s
    retries: 3
  deploy:
    resources:
      limits:
        cpus: "1.0"



services:

  biochirp_redis_tool:
    image: redis:7
    # container_name: biochirp_redis_tool
    networks:
      - semantic_net

  # biochirp_redis_tool:
  #   # <<: *defaults
  #   image: biochirp_redis_tool:latest
  #   container_name: biochirp_redis_tool
  #   # ports:
  #   #   - "6379:6379"
  #   environment:
  #     - TZ=Asia/Kolkata
  #     - PYTHONUNBUFFERED=1
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 24g
  #         cpus: "1.0"
  #       reservations:
  #         memory: 16g
  #   networks:
  #     - semantic_net


  biochirp_llm_filter_tool:
    <<: *defaults
    build:
      context: ./app/tools/llm_member_filter
    image: biochirp_llm_filter_tool:latest
    container_name: biochirp_llm_filter_tool
    ports:
      - "8017:8017"
    volumes:
    - ./config/guardrail.py:/app/config/guardrail.py:ro
    - ./resources/prompts/:/app/resources/prompts/:ro
    - ./config/schema.py:/app/config/schema.py:ro
    - ./config/settings.py:/app/config/settings.py:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8017/health || exit 1"]
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 400m




  biochirp_synonyms_expander:
    <<: *defaults
    build:
      context: ./app/tools/expand_synonyms
      # dockerfile: Dockerfile
    image: biochirp_synonyms_expander:latest
    # mem_limit: 2g
    container_name: biochirp_synonyms_expander
    ports:
      - "8014:8014"
    environment:
      - DB_VALUE_PATH=/app/resources/values/concept_values_by_db_and_field.pkl
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8014/health || exit 1"]
      start_period: 30s
    volumes:
      - ./config/guardrail.py:/app/config/guardrail.py:ro
      - ./app/services/synonyms/:/app/synonyms/:ro
      - ./resources/values:/app/resources/values:ro
    deploy:
      resources:
        limits:
          memory: 8g
        reservations:
          memory: 4g


  biochirp_synonyms_expander_unrestricted:
    <<: *defaults
    build:
      context: ./app/tools/expand_synonyms_unrestricted
      dockerfile: dockerfile
    image: biochirp_synonyms_expander_unrestricted:latest
    container_name: biochirp_synonyms_expander_unrestricted
    ports:
      - "8032:8032"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8032/health || exit 1"]
      start_period: 30s
    volumes:
      - ./config/guardrail.py:/app/config/guardrail.py:ro
      - ./app/services/synonyms/:/app/synonyms/:ro
      - ./config/schema.py:/app/config/schema.py:ro
      - ./config/settings.py:/app/config/settings.py:ro
    deploy:
      resources:
        limits:
          memory: 8g
        reservations:
          memory: 4g
    networks:
      - semantic_net
      
  biochirp_interpreter_tool:
    <<: *defaults
    build:
      context: ./app/tools/interpreter_agent
      dockerfile: Dockerfile
    image: biochirp_interpreter_tool:latest
    container_name: biochirp_interpreter_tool
    ports:
      - "8005:8005"
    volumes:
      - ./config/guardrail.py:/app/config/guardrail.py:ro
      # - ./resources/prompts/query_interpreter.md:/app/resources/prompts/query_interpreter.md:ro
      - ./resources/prompts/:/app/resources/prompts/:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8005/health || exit 1"]
      start_period: 15s
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 256m


  

  biochirp_fuzzy_tool:
    <<: *defaults
    build:
      context: ./app/tools/fuzzy
    image: biochirp_fuzzy_tool:latest
    container_name: biochirp_fuzzy_tool
    ports:
      - "8013:8013"
    environment:
      - LLM_FILTER_PORT=8017
      - LLM_FILTER_HOST=biochirp_llm_filter_tool
    volumes:
      - ./config/guardrail.py:/app/config/guardrail.py:ro
      - ./resources/values/concept_values_by_db_and_field.pkl:/app/resources/values/concept_values_by_db_and_field.pkl:ro
      - ./config/schema.py:/app/config/schema.py:ro
      - ./config/settings.py:/app/config/settings.py:ro

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8013/health || exit 1"]
      start_period: 15s
    depends_on:
      - biochirp_llm_filter_tool
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 2g




  biochirp_tavily_tool:
    <<: *defaults
    build:
      context: ./app/tools/tavily
    image: biochirp_tavily_tool:latest
    container_name: biochirp_tavily_tool
    ports:
      - "8008:8008"
    volumes:
      - ./config/guardrail.py:/app/config/guardrail.py:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8008/health || exit 1"]
      start_period: 15s
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 512m


  biochirp_readme_tool:
    <<: *defaults
    build:
