      - EXPAND_HOST=biochirp_synonyms_expander
      - EXPAND_PORT=8014
      - FUZZY_HOST=biochirp_fuzzy_tool
      - FUZZY_PORT=8013
      - SEMANTIC_HOST=biochirp_semantic_tool
